<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f0f23" />
    <meta name="description" content="PKHeX - Cross-platform Pokémon save file editor with mystery gift database" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="PKHeX" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <script>
      try {
        var th = localStorage.getItem('pkhex-theme');
        document.documentElement.classList.toggle('dark', th !== 'light');
        document.documentElement.classList.toggle('light', th === 'light');
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
    <title>PKHeX</title>
  </head>
  <body class="min-h-screen antialiased transition-colors duration-200 bg-surface-100 text-surface-900 dark:bg-surface-950 dark:text-white">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
